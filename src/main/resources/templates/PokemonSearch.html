<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pokémon Inventory</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 8px 20px rgba(17,24,39,.08);
      --shadow2:0 2px 10px rgba(17,24,39,.06);
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --chip:#eef2ff;
      --thumb-border:#f5c400;
      --radius:14px;
      --focus:0 0 0 3px rgba(37,99,235,.16);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1180px;
      margin:0 auto;
      padding:22px 16px 40px;
    }

    .header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:12px;
    }

    h1{
      margin:0;
      font-size:26px;
      letter-spacing:-.02em;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    /* Search panel */
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      box-shadow:var(--shadow2);
      border-radius:var(--radius);
      padding:14px;
      margin-top:14px;
    }

    .panel-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .tabs{
      display:flex;
      background:#f3f4f6;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }

    .tab-btn{
      appearance:none;
      border:0;
      background:transparent;
      padding:10px 14px;
      font-weight:900;
      font-size:14px;
      color:#374151;
      cursor:pointer;
      user-select:none;
    }
    .tab-btn.active{
      background:var(--card);
      color:var(--text);
      box-shadow:0 1px 0 rgba(0,0,0,.03);
    }

    .mode-row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      display:flex;
      background:#f3f4f6;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }
    .pill button{
      border:0;
      background:transparent;
      padding:8px 12px;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      color:#374151;
    }
    .pill button.active{
      background:var(--card);
      color:var(--text);
    }

    .inline{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:13px;
      user-select:none;
    }
    .inline input[type="checkbox"]{
      width:16px;
      height:16px;
      accent-color:var(--blue);
    }

    .divider{
      height:1px;
      background:var(--border);
      margin:12px 0;
    }

    .fields{
      display:grid;
      grid-template-columns:repeat(12, 1fr);
      gap:10px;
      align-items:end;
    }

    .field{ grid-column:span 3; min-width:160px; }
    .field.w2{ grid-column:span 2; min-width:130px; }
    .field.w4{ grid-column:span 4; min-width:220px; }
    .field.w6{ grid-column:span 6; min-width:260px; }

    label{
      display:block;
      font-size:12px;
      font-weight:900;
      color:#374151;
      margin-bottom:6px;
      letter-spacing:.02em;
    }

    input{
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      outline:none;
      background:#fff;
      font-size:14px;
      color:var(--text);
    }
    input:focus{
      border-color:rgba(37,99,235,.6);
      box-shadow:var(--focus);
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      color:white;
      background:var(--blue);
      transition:transform .04s ease, background .12s ease;
    }
    .btn:hover{ background:var(--blue2); }
    .btn:active{ transform:translateY(1px); }
    .btn.secondary{ background:#111827; }
    .btn.secondary:hover{ background:#0b1220; }

    .hidden{ display:none !important; }

    /* Results */
    .section-head{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-top:18px;
      margin-bottom:10px;
    }
    h2{
      margin:0;
      font-size:18px;
      letter-spacing:-.01em;
    }
    .count{
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:16px;
    }
    @media (max-width:980px){
      .grid{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .field{ grid-column:span 6; }
      .field.w2{ grid-column:span 6; }
      .field.w4{ grid-column:span 6; }
      .field.w6{ grid-column:span 12; }
    }
    @media (max-width:640px){
      .grid{ grid-template-columns:1fr; }
      .field,.field.w2,.field.w4,.field.w6{ grid-column:span 12; min-width:0; }
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow2);
      padding:12px;
      display:flex;
      gap:12px;
      min-height:132px;
    }

    .thumb{
      width:96px;
      min-width:96px;
      height:132px;
      border-radius:10px;
      border:4px solid var(--thumb-border);
      overflow:hidden;
      background:linear-gradient(135deg, #f3f4f6, #e5e7eb);
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(17,24,39,.55);
      font-weight:900;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .content{ flex:1; min-width:0; }

    .title{
      font-size:16px;
      font-weight:900;
      margin:2px 0 6px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-bottom:10px;
    }

    .line{
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      background:var(--chip);
      color:#3730a3;
      font-weight:900;
      font-size:12px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(55,48,163,.12);
    }

    .kv{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:6px 10px;
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid var(--border);
    }
    .k{
      color:#374151;
      font-weight:900;
      font-size:12px;
      text-transform:capitalize;
    }
    .v{
      color:#111827;
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .empty{
      color:var(--muted);
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:var(--radius);
      padding:16px;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Pokémon Inventory</h1>
      <div class="sub">Search Singles and Sealed. Layout keeps space for future images (left slot).</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-top">
      <!-- Tap to switch Singles/Sealed -->
      <div class="tabs" role="tablist" aria-label="Category">
        <button class="tab-btn active" id="tabSingles" type="button" onclick="setCategory('singles')">Singles</button>
        <button class="tab-btn" id="tabSealed" type="button" onclick="setCategory('sealed')">Sealed</button>
      </div>

      <!-- Singles-only toggles -->
      <div class="mode-row" id="singlesModes">
        <div class="pill" aria-label="Condition / Graded toggle">
          <button id="btnRaw" type="button" class="active" onclick="setSinglesMode('raw')">Condition</button>
          <button id="btnGraded" type="button" onclick="setSinglesMode('graded')">Graded</button>
        </div>

        <!-- This matches your idea: in graded mode, ignore company/grade UNLESS the user clicks the checkbox -->
        <label class="inline" id="gradeFilterWrap">
          <input id="useGradeFilter" type="checkbox" onchange="toggleGradeFields()" />
          Filter by grade
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Singles Fields -->
    <div id="singlesSearch" class="fields">
      <div class="field w6">
        <label for="singlesName">Name</label>
        <input id="singlesName" type="text" placeholder="e.g., Pokemon Catcher" />
      </div>

      <div class="field w2">
        <label for="singlesCollectorNumber">Collector #</label>
        <input id="singlesCollectorNumber" type="text" placeholder="e.g., 138/159" />
      </div>

      <div class="field w4" id="conditionFieldWrap">
        <label for="singlesCondition">Condition</label>
        <input id="singlesCondition" type="text" placeholder="e.g., NM, LP, MP..." />
      </div>

      <!-- NEW: Set + Year -->
      <div class="field w4">
        <label for="singlesSet">Set</label>
        <input id="singlesSet" type="text" placeholder="e.g., Base Set, Crown Zenith..." />
      </div>

      <div class="field w2">
        <label for="singlesYear">Year</label>
        <input id="singlesYear" type="number" inputmode="numeric" placeholder="e.g., 1999" />
      </div>

      <div class="field w2">
        <label for="singlesId">ID</label>
        <input id="singlesId" type="number" placeholder="e.g., 123" />
      </div>

      <!-- Graded fields (only show if Filter by grade = ON) -->
      <div class="field w4 hidden" id="gradedCompanyWrap">
        <label for="gradedCompany">Graded Company</label>
        <input id="gradedCompany" type="text" placeholder="e.g., PSA, BGS, CGC..." />
      </div>

      <div class="field w2 hidden" id="gradedValueWrap">
        <label for="gradedValue">Grade</label>
        <input id="gradedValue" type="text" placeholder="e.g., 10, Pristine 10, Gold Label 10..." />
      </div>
    </div>

    <!-- Sealed Fields -->
    <div id="sealedSearch" class="fields hidden">
      <div class="field w6">
        <label for="sealedName">Name</label>
        <input id="sealedName" type="text" placeholder="e.g., Pokemon Day 2026 Collection" />
      </div>

      <div class="field w4">
        <label for="sealedProductType">Product Type</label>
        <input id="sealedProductType" type="text" placeholder="e.g., ETB, Booster Box, Tin..." />
      </div>

      <!-- NEW: Set + Year -->
      <div class="field w4">
        <label for="sealedSet">Set</label>
        <input id="sealedSet" type="text" placeholder="e.g., Crown Zenith..." />
      </div>

      <div class="field w2">
        <label for="sealedYear">Year</label>
        <input id="sealedYear" type="number" inputmode="numeric" placeholder="e.g., 2026" />
      </div>

      <div class="field w2">
        <label for="sealedId">ID</label>
        <input id="sealedId" type="number" placeholder="e.g., 456" />
      </div>
    </div>

    <div class="actions">
      <button class="btn secondary" type="button" onclick="clearSearch()">Clear</button>
      <button class="btn" type="button" onclick="loadProducts()">Search</button>
    </div>
  </div>

  <!-- Singles Results -->
  <div id="singlesView">
    <div class="section-head">
      <h2>Singles</h2>
      <div class="count" id="singlesCount">—</div>
    </div>
    <div id="singlesResults" class="grid"></div>
  </div>

  <!-- Sealed Results -->
  <div id="sealedView" class="hidden">
    <div class="section-head">
      <h2>Sealed</h2>
      <div class="count" id="sealedCount">—</div>
    </div>
    <div id="sealedResults" class="grid"></div>
  </div>
</div>

<script>
  let currentCategory = 'singles'; // 'singles' | 'sealed'
  let singlesMode = 'raw';         // 'raw' | 'graded'

  function setCategory(cat){
    currentCategory = cat;

    document.getElementById('tabSingles').classList.toggle('active', cat === 'singles');
    document.getElementById('tabSealed').classList.toggle('active', cat === 'sealed');

    document.getElementById('singlesSearch').classList.toggle('hidden', cat !== 'singles');
    document.getElementById('sealedSearch').classList.toggle('hidden', cat !== 'sealed');

    document.getElementById('singlesView').classList.toggle('hidden', cat !== 'singles');
    document.getElementById('sealedView').classList.toggle('hidden', cat !== 'sealed');

    document.getElementById('singlesModes').classList.toggle('hidden', cat !== 'singles');

    if (cat === 'singles') setSinglesMode(singlesMode);

    loadProducts();
  }

  function setSinglesMode(mode){
    singlesMode = mode;

    document.getElementById('btnRaw').classList.toggle('active', mode === 'raw');
    document.getElementById('btnGraded').classList.toggle('active', mode === 'graded');

    // Raw shows Condition field
    document.getElementById('conditionFieldWrap').classList.toggle('hidden', mode !== 'raw');

    // Graded shows the checkbox, but NOT the fields unless checked
    document.getElementById('gradeFilterWrap').classList.toggle('hidden', mode !== 'graded');

    if (mode !== 'graded') document.getElementById('useGradeFilter').checked = false;

    toggleGradeFields();
  }

  function toggleGradeFields(){
    const on = (singlesMode === 'graded') && document.getElementById('useGradeFilter').checked;
    document.getElementById('gradedCompanyWrap').classList.toggle('hidden', !on);
    document.getElementById('gradedValueWrap').classList.toggle('hidden', !on);

    if (!on) {
      document.getElementById('gradedCompany').value = '';
      document.getElementById('gradedValue').value = '';
    }
  }

  function clearSearch(){
    document.querySelectorAll('#singlesSearch input, #sealedSearch input').forEach(i => i.value = '');
    document.getElementById('useGradeFilter').checked = false;
    setSinglesMode('raw');
  }

  function firstNonEmpty(obj, keys){
    for (const k of keys){
      if (obj && obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== '') return obj[k];
    }
    return '';
  }

  function addKV(kv, label, value){
    const kEl = document.createElement('div');
    kEl.className = 'k';
    kEl.textContent = label;

    const vEl = document.createElement('div');
    vEl.className = 'v';
    vEl.title = String(value);
    vEl.textContent = String(value);

    kv.appendChild(kEl);
    kv.appendChild(vEl);
  }

  function buildCard(product, type){
    const card = document.createElement('div');
    card.className = 'card';

    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    // keep placeholder space for future DB images
    thumb.textContent = 'IMAGE';

    const content = document.createElement('div');
    content.className = 'content';

    const name = firstNonEmpty(product, ['name']) || '(No name)';
    const setVal = firstNonEmpty(product, ['set']);
    const yearVal = firstNonEmpty(product, ['year']);
    const collector = firstNonEmpty(product, ['collectorNumber']);
    const condition = firstNonEmpty(product, ['condition']);
    const productType = firstNonEmpty(product, ['productType']);
    const specialty = firstNonEmpty(product, ['specialty']);
    const gradedCompany = firstNonEmpty(product, ['gradedCompany']);
    const graded = firstNonEmpty(product, ['graded']);
    const idVal = firstNonEmpty(product, ['id']);

    const title = document.createElement('div');
    title.className = 'title';
    title.title = name;
    title.textContent = name;

    const meta = document.createElement('div');
    meta.className = 'meta';

    const line1 = document.createElement('div');
    line1.className = 'line';

    const left1 = (type === 'sealed') ? (productType || setVal) : (setVal || '');
    if (left1) line1.appendChild(Object.assign(document.createElement('span'), { textContent: left1 }));
    if (yearVal !== '') {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = `Year: ${yearVal}`;
      line1.appendChild(chip);
    }
    if (!left1 && yearVal === '') line1.textContent = ' ';

    const line2 = document.createElement('div');
    line2.className = 'line';

    if (type === 'singles' && collector) line2.appendChild(Object.assign(document.createElement('span'), { textContent: `#${collector}` }));
    if (type === 'singles' && condition) line2.appendChild(Object.assign(document.createElement('span'), { textContent: condition }));
    if (specialty) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = specialty;
      line2.appendChild(chip);
    }
    if (type === 'singles' && (gradedCompany || graded)) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = `${gradedCompany ? gradedCompany : 'Graded'}${graded ? ` ${graded}` : ''}`;
      line2.appendChild(chip);
    }

    meta.appendChild(line1);
    meta.appendChild(line2);

    const kv = document.createElement('div');
    kv.className = 'kv';

    // keep it clean (like your screenshot): only key info
    if (idVal !== '') addKV(kv, 'ID', idVal);
    if (setVal) addKV(kv, 'Set', setVal);
    if (yearVal !== '') addKV(kv, 'Year', yearVal);

    if (type === 'singles') {
      if (collector) addKV(kv, 'Collector #', collector);
      if (condition) addKV(kv, 'Condition', condition);
      if (gradedCompany) addKV(kv, 'Grade Co.', gradedCompany);
      if (graded) addKV(kv, 'Grade', graded);
    } else {
      if (productType) addKV(kv, 'Product Type', productType);
    }

    content.appendChild(title);
    content.appendChild(meta);
    content.appendChild(kv);

    card.appendChild(thumb);
    card.appendChild(content);
    return card;
  }

  function displayProducts(type, data){
    const containerId = type === 'singles' ? 'singlesResults' : 'sealedResults';
    const countId = type === 'singles' ? 'singlesCount' : 'sealedCount';

    const container = document.getElementById(containerId);
    const count = document.getElementById(countId);

    container.innerHTML = '';

    if (!data || !Array.isArray(data) || data.length === 0) {
      count.textContent = '0 results';
      container.innerHTML = `<div class="empty">No results found.</div>`;
      return;
    }

    count.textContent = `${data.length} result${data.length === 1 ? '' : 's'}`;
    data.forEach(p => container.appendChild(buildCard(p, type)));
  }

  function buildSearchParams(){
    const params = new URLSearchParams();
    params.set('type', currentCategory);

    if (currentCategory === 'singles') {
      const id = document.getElementById('singlesId').value.trim();
      const name = document.getElementById('singlesName').value.trim();
      const collector = document.getElementById('singlesCollectorNumber').value.trim();
      const setVal = document.getElementById('singlesSet').value.trim();
      const yearVal = document.getElementById('singlesYear').value.trim();

      if (id) params.set('idQuery', id);
      if (name) params.set('nameQuery', name);
      if (collector) params.set('collectorNumberQuery', collector);

      // NEW
      if (setVal) params.set('setQuery', setVal);
      if (yearVal) params.set('yearQuery', yearVal);

      // Mode behavior:
      // - raw: send conditionQuery
      // - graded: ignore grade/company unless user checks filter box
      // ALSO send singlesMode + useGradeFilter (safe even if backend ignores them)
      params.set('singlesMode', singlesMode);
      const useGradeFilter = (singlesMode === 'graded') && document.getElementById('useGradeFilter').checked;
      params.set('useGradeFilter', useGradeFilter ? 'true' : 'false');

      if (singlesMode === 'raw') {
        const condition = document.getElementById('singlesCondition').value.trim();
        if (condition) params.set('conditionQuery', condition);
      } else if (useGradeFilter) {
        const company = document.getElementById('gradedCompany').value.trim();
        const grade = document.getElementById('gradedValue').value.trim();
        if (company) params.set('gradedCompanyQuery', company);
        if (grade) params.set('gradedValueQuery', grade);
      }
    } else {
      const id = document.getElementById('sealedId').value.trim();
      const name = document.getElementById('sealedName').value.trim();
      const productType = document.getElementById('sealedProductType').value.trim();
      const setVal = document.getElementById('sealedSet').value.trim();
      const yearVal = document.getElementById('sealedYear').value.trim();

      if (id) params.set('idQuery', id);
      if (name) params.set('nameQuery', name);
      if (productType) params.set('productTypeQuery', productType);

      // NEW
      if (setVal) params.set('setQuery', setVal);
      if (yearVal) params.set('yearQuery', yearVal);
    }

    return params;
  }

  function loadProducts(){
    const params = buildSearchParams();
    const url = `/inventory/pokemon/search?${params.toString()}`;

    fetch(url)
            .then(res => res.json())
            .then(data => displayProducts(currentCategory, data))
            .catch(err => console.error(err));
  }

  // Enter-to-search
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadProducts();
  });

  // Init
  document.addEventListener('DOMContentLoaded', () => {
    setCategory('singles');
    setSinglesMode('raw');
    loadProducts();
  });
</script>

</body>
</html>
