<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pokémon Inventory</title>

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 8px 20px rgba(17,24,39,.08);
      --shadow2:0 2px 10px rgba(17,24,39,.06);
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --chip:#eef2ff;
      --thumb-border:#6b7280;
      --radius:14px;
      --focus:0 0 0 3px rgba(37,99,235,.16);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:1600px;
      width: min(1600px, calc(100vw - 32px));
      margin:0 auto;
      padding:18px 16px 40px;
    }

    .header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:12px;
    }

    h1{
      margin:0;
      font-size:26px;
      letter-spacing:-.02em;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--border);
      box-shadow:var(--shadow2);
      border-radius:var(--radius);
      padding:14px;
      margin-top:10px;
    }

    .panel-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .tabs{
      display:flex;
      background:#f3f4f6;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }

    .tab-btn{
      appearance:none;
      border:0;
      background:transparent;
      padding:10px 14px;
      font-weight:900;
      font-size:14px;
      color:#374151;
      cursor:pointer;
      user-select:none;
    }
    .tab-btn.active{
      background:var(--card);
      color:var(--text);
      box-shadow:0 1px 0 rgba(0,0,0,.03);
    }

    .mode-row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      display:flex;
      background:#f3f4f6;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }
    .pill button{
      border:0;
      background:transparent;
      padding:8px 12px;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      color:#374151;
    }
    .pill button.active{
      background:var(--card);
      color:var(--text);
    }

    .divider{
      height:1px;
      background:var(--border);
      margin:12px 0;
    }

    .fields{
      display:grid;
      grid-template-columns:repeat(12, 1fr);
      gap:10px;
      align-items:end;
    }

    .field{ grid-column:span 3; min-width:160px; }
    .field.w2{ grid-column:span 2; min-width:130px; }
    .field.w4{ grid-column:span 4; min-width:220px; }
    .field.w6{ grid-column:span 6; min-width:260px; }

    label{
      display:block;
      font-size:12px;
      font-weight:900;
      color:#374151;
      margin-bottom:6px;
      letter-spacing:.02em;
    }

    input{
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      outline:none;
      background:#fff;
      font-size:14px;
      color:var(--text);
    }
    input:focus{
      border-color:rgba(37,99,235,.6);
      box-shadow:var(--focus);
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      color:white;
      background:var(--blue);
      transition:transform .04s ease, background .12s ease;
    }
    .btn:hover{ background:var(--blue2); }
    .btn:active{ transform:translateY(1px); }
    .btn.secondary{ background:#111827; }
    .btn.secondary:hover{ background:#0b1220; }

    .hidden{ display:none !important; }

    .section-head{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-top:18px;
      margin-bottom:10px;
    }
    h2{
      margin:0;
      font-size:18px;
      letter-spacing:-.01em;
    }
    .count{
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:18px;
    }

    @media (max-width:980px){
      .grid{ grid-template-columns:repeat(4, minmax(0, 1fr)); }
      .field{ grid-column:span 6; }
      .field.w2{ grid-column:span 6; }
      .field.w4{ grid-column:span 6; }
      .field.w6{ grid-column:span 12; }
    }
    @media (max-width:640px){
      .grid{ grid-template-columns:1fr; }
      .field,.field.w2,.field.w4,.field.w6{ grid-column:span 12; min-width:0; }
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow2);
      padding:14px;
      display:flex;
      gap:14px;
      min-height:170px;
    }

    .thumb{
      position:relative;
      width:132px;
      min-width:132px;
      height:184px;
      border-radius:12px;
      border:4px solid var(--thumb-border);
      overflow:hidden;
      background:linear-gradient(135deg, #f3f4f6, #e5e7eb);
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(17,24,39,.55);
      font-weight:900;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .qty-badge{
      position:absolute;
      top:8px;
      right:8px;
      z-index:2;
      background:rgba(17,24,39,.92);
      color:#fff;
      font-weight:900;
      font-size:12px;
      line-height:1;
      padding:7px 9px;
      border-radius:999px;
      box-shadow:0 2px 8px rgba(0,0,0,.18);
      letter-spacing:0;
      text-transform:none;
    }

    .content{ flex:1; min-width:0; }

    .title{
      font-size:17px;
      font-weight:900;
      margin:2px 0 6px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:10px;
    }

    .line{
      color:var(--muted);
      font-size:14px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .chip{
      background:var(--chip);
      color:#3730a3;
      font-weight:900;
      font-size:12px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(55,48,163,.12);
    }

    .chip-graded{
      background:#fee2e2;
      color:#b91c1c;
      font-weight:900;
      font-size:13px;
      padding:5px 10px;
      border-radius:999px;
      border:1px solid #fecaca;
      box-shadow:0 1px 4px rgba(185,28,28,.10);
    }

    .price-row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:2px;
    }

    .price-box{
      border:1px solid #bbf7d0;
      border-radius:10px;
      padding:8px 10px;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
      user-select:none;
      transition:transform .04s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .price-box:hover{
      transform:translateY(-1px);
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }

    .price-fresh{
      background:#f0fdf4;
      color:#15803d;
      border-color:#86efac;
    }

    .price-warning{
      background:#fffbeb;
      color:#b45309;
      border-color:#fcd34d;
    }

    .price-stale{
      background:#fef2f2;
      color:#b91c1c;
      border-color:#fca5a5;
    }

    .price-missing{
      background:#f3f4f6;
      color:#6b7280;
      border-color:#d1d5db;
    }

    .verify-btn{
      border:1px solid var(--border);
      background:#fff;
      color:#111827;
      border-radius:10px;
      padding:8px 10px;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
    }
    .verify-btn:hover{
      background:#f9fafb;
    }

    .price-date{
      font-size:12px;
      color:var(--muted);
    }

    .kv{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:6px 10px;
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid var(--border);
    }
    .k{
      color:#374151;
      font-weight:900;
      font-size:12px;
      text-transform:capitalize;
    }
    .v{
      color:#111827;
      font-size:14px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .empty{
      color:var(--muted);
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:var(--radius);
      padding:16px;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Pokémon Inventory</h1>
    </div>
  </div>

  <div class="panel">
    <div class="panel-top">
      <div class="tabs" role="tablist" aria-label="Category">
        <button class="tab-btn active" id="tabSingles" type="button" onclick="setCategory('singles')">Singles</button>
        <button class="tab-btn" id="tabSealed" type="button" onclick="setCategory('sealed')">Sealed</button>
      </div>

      <div class="mode-row" id="singlesModes">
        <div class="pill" aria-label="Condition / Graded toggle">
          <button id="btnRaw" type="button" class="active" onclick="setSinglesMode('raw')">Condition</button>
          <button id="btnGraded" type="button" onclick="setSinglesMode('graded')">Graded</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div id="singlesSearch" class="fields">
      <div class="field w6">
        <label for="singlesName">Name</label>
        <input id="singlesName" type="text" placeholder="Pokemon name" />
      </div>

      <div class="field w2">
        <label for="singlesCollectorNumber">Collector #</label>
        <input id="singlesCollectorNumber" type="text" placeholder="card/promo #" />
      </div>

      <div class="field w4" id="conditionFieldWrap">
        <label for="singlesCondition">Condition</label>
        <input id="singlesCondition" type="text" placeholder="MNT, NM, LP, MP..." />
      </div>

      <div class="field w4 hidden" id="gradedCompanyWrap">
        <label for="gradedCompany">Graded Company</label>
        <input id="gradedCompany" type="text" placeholder="PSA, BGS, CGC..." />
      </div>

      <div class="field w2 hidden" id="gradedValueWrap">
        <label for="gradedValue">Grade</label>
        <input id="gradedValue" type="text" placeholder="10, Pristine 10, Gold Label 10..." />
      </div>

      <div class="field w4">
        <label for="singlesSet">Set</label>
        <input id="singlesSet" type="text" placeholder="Base Set, Crown Zenith..." />
      </div>

      <div class="field w2">
        <label for="singlesYear">Year</label>
        <input id="singlesYear" type="number" inputmode="numeric" placeholder="1999" />
      </div>

      <div class="field w2">
        <label for="singlesId">ID</label>
        <input id="singlesId" type="number" placeholder="123" />
      </div>
    </div>

    <div id="sealedSearch" class="fields hidden">
      <div class="field w6">
        <label for="sealedName">Name</label>
        <input id="sealedName" type="text" placeholder="Base set Booster box" />
      </div>

      <div class="field w4">
        <label for="sealedProductType">Product Type</label>
        <input id="sealedProductType" type="text" placeholder="ETB, Booster Box, Tin..." />
      </div>

      <div class="field w4">
        <label for="sealedSet">Set</label>
        <input id="sealedSet" type="text" placeholder="Base set..." />
      </div>

      <div class="field w2">
        <label for="sealedYear">Year</label>
        <input id="sealedYear" type="number" inputmode="numeric" placeholder="1999" />
      </div>

      <div class="field w2">
        <label for="sealedId">ID</label>
        <input id="sealedId" type="number" placeholder="456" />
      </div>
    </div>

    <div class="actions">
      <button class="btn secondary" type="button" onclick="clearSearch()">Clear</button>
      <button class="btn" type="button" onclick="loadProducts()">Search</button>
    </div>
  </div>

  <div id="singlesView">
    <div class="section-head">
      <h2>Singles</h2>
      <div class="count" id="singlesCount">—</div>
    </div>
    <div id="singlesResults" class="grid"></div>
  </div>

  <div id="sealedView" class="hidden">
    <div class="section-head">
      <h2>Sealed</h2>
      <div class="count" id="sealedCount">—</div>
    </div>
    <div id="sealedResults" class="grid"></div>
  </div>
</div>

<script>
  let currentCategory = 'singles';
  let singlesMode = 'raw';

  function setCategory(cat){
    currentCategory = cat;

    document.getElementById('tabSingles').classList.toggle('active', cat === 'singles');
    document.getElementById('tabSealed').classList.toggle('active', cat === 'sealed');

    document.getElementById('singlesSearch').classList.toggle('hidden', cat !== 'singles');
    document.getElementById('sealedSearch').classList.toggle('hidden', cat !== 'sealed');

    document.getElementById('singlesView').classList.toggle('hidden', cat !== 'singles');
    document.getElementById('sealedView').classList.toggle('hidden', cat !== 'sealed');

    document.getElementById('singlesModes').classList.toggle('hidden', cat !== 'singles');

    if (cat === 'singles') setSinglesMode(singlesMode, false);

    loadProducts();
  }

  function setSinglesMode(mode, doSearch = true){
    singlesMode = mode;

    document.getElementById('btnRaw').classList.toggle('active', mode === 'raw');
    document.getElementById('btnGraded').classList.toggle('active', mode === 'graded');

    document.getElementById('conditionFieldWrap').classList.toggle('hidden', mode !== 'raw');
    document.getElementById('gradedCompanyWrap').classList.toggle('hidden', mode !== 'graded');
    document.getElementById('gradedValueWrap').classList.toggle('hidden', mode !== 'graded');

    if (mode === 'raw') {
      document.getElementById('gradedCompany').value = '';
      document.getElementById('gradedValue').value = '';
    } else {
      document.getElementById('singlesCondition').value = '';
    }

    if (doSearch) loadProducts();
  }

  function clearSearch(){
    if (currentCategory === 'singles') {
      ['singlesName','singlesCollectorNumber','singlesSet','singlesYear','singlesId']
              .forEach(id => document.getElementById(id).value = '');

      if (singlesMode === 'raw') {
        document.getElementById('singlesCondition').value = '';
      } else {
        document.getElementById('gradedCompany').value = '';
        document.getElementById('gradedValue').value = '';
      }
    } else {
      ['sealedName','sealedProductType','sealedSet','sealedYear','sealedId']
              .forEach(id => document.getElementById(id).value = '');
    }

    loadProducts();
  }

  function normalizeStr(x){
    if (x === null || x === undefined) return '';
    return String(x).trim().toLowerCase();
  }

  function isNonEmpty(x){
    return normalizeStr(x) !== '';
  }

  function firstNonEmpty(obj, keys){
    for (const k of keys){
      if (obj && obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== '') return obj[k];
    }
    return '';
  }

  function parseDate(value){
    if (!value) return null;
    const d = new Date(value);
    return isNaN(d.getTime()) ? null : d;
  }

  function daysSince(dateValue){
    const d = parseDate(dateValue);
    if (!d) return null;
    const diffMs = Date.now() - d.getTime();
    return Math.floor(diffMs / (1000 * 60 * 60 * 24));
  }

  function getPriceStatus(product){
    const price = firstNonEmpty(product, ['price']);
    const verified = product?.verified;
    const updated = firstNonEmpty(product, ['lastUpdated', 'timeStamp', 'timeStmp']);

    if (price === '') return 'missing';

    const age = daysSince(updated);
    if (age === null) return verified ? 'fresh' : 'warning';
    if (age > 21) return 'stale';
    if (age > 7) return 'warning';
    return 'fresh';
  }

  function formatPrice(value){
    if (value === null || value === undefined || String(value).trim() === '') return 'Set Price';
    const num = Number(value);
    if (Number.isNaN(num)) return `$${value}`;
    return `$${num.toFixed(2)}`;
  }

  function formatUpdated(value){
    const d = parseDate(value);
    if (!d) return 'Never verified';
    return `Updated ${d.toLocaleDateString()}`;
  }

  function applySetYearFilters(list, type){
    const setInput = type === 'singles'
            ? document.getElementById('singlesSet').value.trim()
            : document.getElementById('sealedSet').value.trim();

    const yearInput = type === 'singles'
            ? document.getElementById('singlesYear').value.trim()
            : document.getElementById('sealedYear').value.trim();

    let out = list;

    if (setInput) {
      const wantSet = normalizeStr(setInput);
      out = out.filter(p => normalizeStr(p?.set).includes(wantSet));
    }

    if (yearInput) {
      const wantYear = String(yearInput).trim();
      out = out.filter(p => String(p?.year ?? '').trim() === wantYear);
    }

    return out;
  }

  function addKV(kv, label, value){
    const kEl = document.createElement('div');
    kEl.className = 'k';
    kEl.textContent = label;

    const vEl = document.createElement('div');
    vEl.className = 'v';
    vEl.title = String(value);
    vEl.textContent = String(value);

    kv.appendChild(kEl);
    kv.appendChild(vEl);
  }

  async function updatePrice(type, id){
    const raw = window.prompt('Enter new price:');
    if (raw === null) return;

    const cleaned = raw.replace('$', '').trim();
    if (!cleaned || isNaN(Number(cleaned))) {
      alert('Please enter a valid number.');
      return;
    }

    const csrfToken = getCsrfToken();

    const url = type === 'singles'
            ? `/inventory/pokemon/singles/${id}/price`
            : `/inventory/pokemon/sealed/${id}/price`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'X-XSRF-TOKEN': csrfToken
        },
        body: new URLSearchParams({ price: cleaned }).toString()
      });

      if (!res.ok) throw new Error(`Failed to update price: ${res.status}`);
      loadProducts();
    } catch (err) {
      console.error(err);
      alert('Could not update price.');
    }
  }

  async function verifyPrice(type, id){
    const csrfToken = getCsrfToken();

    const url = type === 'singles'
            ? `/inventory/pokemon/singles/${id}/verify`
            : `/inventory/pokemon/sealed/${id}/verify`;

    try {
      const res = await fetch(url, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'X-XSRF-TOKEN': csrfToken
        }
      });

      if (!res.ok) throw new Error(`Failed to verify price: ${res.status}`);
      loadProducts();
    } catch (err) {
      console.error(err);
      alert('Could not verify price.');
    }
  }

  function buildPriceControls(product, type, idVal){
    const price = firstNonEmpty(product, ['price']);
    const updated = firstNonEmpty(product, ['lastUpdated', 'timeStamp', 'timeStmp']);
    const status = getPriceStatus(product);

    const row = document.createElement('div');
    row.className = 'price-row';

    const priceBox = document.createElement('button');
    priceBox.type = 'button';
    priceBox.className = 'price-box';
    priceBox.classList.add(
            status === 'fresh' ? 'price-fresh' :
                    status === 'warning' ? 'price-warning' :
                            status === 'stale' ? 'price-stale' : 'price-missing'
    );
    priceBox.textContent = formatPrice(price);
    priceBox.onclick = () => updatePrice(type, idVal);

    const verifyBtn = document.createElement('button');
    verifyBtn.type = 'button';
    verifyBtn.className = 'verify-btn';
    verifyBtn.textContent = 'Verify';
    verifyBtn.onclick = () => verifyPrice(type, idVal);

    const dateText = document.createElement('span');
    dateText.className = 'price-date';
    dateText.textContent = formatUpdated(updated);

    row.appendChild(priceBox);
    row.appendChild(verifyBtn);
    row.appendChild(dateText);
    return row;
  }

  function buildCard(product, type){
    const card = document.createElement('div');
    card.className = 'card';

    const name = firstNonEmpty(product, ['name']) || '(No name)';
    const imgUrl = firstNonEmpty(product, ['imageUrl', 'imageURL', 'image_url', 'imgUrl']);
    const quantity = firstNonEmpty(product, ['quantity', 'qty']);

    const thumb = document.createElement('div');
    thumb.className = 'thumb';

    if (quantity !== '') {
      const qtyBadge = document.createElement('div');
      qtyBadge.className = 'qty-badge';
      qtyBadge.textContent = `x${quantity}`;
      thumb.appendChild(qtyBadge);
    }

    if (imgUrl) {
      const img = document.createElement('img');
      img.src = imgUrl;
      img.alt = name;
      img.loading = 'lazy';
      img.referrerPolicy = 'no-referrer';

      img.onerror = () => {
        thumb.innerHTML = '';
        if (quantity !== '') {
          const qtyBadge = document.createElement('div');
          qtyBadge.className = 'qty-badge';
          qtyBadge.textContent = `x${quantity}`;
          thumb.appendChild(qtyBadge);
        }
        thumb.appendChild(document.createTextNode('IMAGE'));
      };

      thumb.appendChild(img);
    } else {
      thumb.textContent = 'IMAGE';
      if (quantity !== '') {
        const qtyBadge = document.createElement('div');
        qtyBadge.className = 'qty-badge';
        qtyBadge.textContent = `x${quantity}`;
        thumb.appendChild(qtyBadge);
      }
    }

    const content = document.createElement('div');
    content.className = 'content';

    const setVal = firstNonEmpty(product, ['set']);
    const yearVal = firstNonEmpty(product, ['year']);
    const collector = firstNonEmpty(product, ['collectorNumber']);
    const condition = firstNonEmpty(product, ['condition']);
    const productType = firstNonEmpty(product, ['productType']);
    const specialty = firstNonEmpty(product, ['specialty']);
    const gradedCompany = firstNonEmpty(product, ['gradedCompany','gradedcompany','graded_company']);
    const graded = firstNonEmpty(product, ['graded','grade']);
    const idVal = firstNonEmpty(product, ['id']);

    const title = document.createElement('div');
    title.className = 'title';
    title.title = name;
    title.textContent = name;

    const meta = document.createElement('div');
    meta.className = 'meta';

    const line1 = document.createElement('div');
    line1.className = 'line';

    const left1 = (type === 'sealed') ? (productType || setVal) : (setVal || '');
    if (left1) line1.appendChild(Object.assign(document.createElement('span'), { textContent: left1 }));
    if (yearVal !== '') {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = `Year: ${yearVal}`;
      line1.appendChild(chip);
    }
    if (!left1 && yearVal === '') line1.textContent = ' ';

    const line2 = document.createElement('div');
    line2.className = 'line';

    if (type === 'singles' && collector) line2.appendChild(Object.assign(document.createElement('span'), { textContent: `#${collector}` }));
    if (type === 'singles' && condition) line2.appendChild(Object.assign(document.createElement('span'), { textContent: condition }));
    if (specialty) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = specialty;
      line2.appendChild(chip);
    }
    if (type === 'singles' && (gradedCompany || graded)) {
      const chip = document.createElement('span');
      chip.className = 'chip-graded';
      chip.textContent = `${gradedCompany ? gradedCompany : 'Graded'}${graded ? ` ${graded}` : ''}`;
      line2.appendChild(chip);
    }

    meta.appendChild(line1);
    meta.appendChild(line2);

    if (idVal !== '') {
      meta.appendChild(buildPriceControls(product, type, idVal));
    }

    const kv = document.createElement('div');
    kv.className = 'kv';

    if (idVal !== '') addKV(kv, 'ID', idVal);
    if (setVal) addKV(kv, 'Set', setVal);
    if (yearVal !== '') addKV(kv, 'Year', yearVal);

    if (type === 'singles') {
      if (collector) addKV(kv, 'Collector #', collector);
      if (condition) addKV(kv, 'Condition', condition);
      if (gradedCompany) addKV(kv, 'Grade Co.', gradedCompany);
      if (graded) addKV(kv, 'Grade', graded);
    } else {
      if (productType) addKV(kv, 'Product Type', productType);
    }

    content.appendChild(title);
    content.appendChild(meta);
    content.appendChild(kv);

    card.appendChild(thumb);
    card.appendChild(content);
    return card;
  }

  function displayProducts(type, data){
    const containerId = type === 'singles' ? 'singlesResults' : 'sealedResults';
    const countId = type === 'singles' ? 'singlesCount' : 'sealedCount';

    const container = document.getElementById(containerId);
    const count = document.getElementById(countId);

    container.innerHTML = '';

    if (!data || !Array.isArray(data) || data.length === 0) {
      count.textContent = '0 results';
      container.innerHTML = `<div class="empty">No results found.</div>`;
      return;
    }

    let filtered = data;
    filtered = applySetYearFilters(filtered, type);

    if (type === 'singles') {
      if (singlesMode === 'raw') {
        filtered = filtered.filter(p => {
          const gc = firstNonEmpty(p, ['gradedCompany','gradedcompany','graded_company']);
          const g  = firstNonEmpty(p, ['graded','grade']);
          return !isNonEmpty(gc) && !isNonEmpty(g);
        });

        const wantCondition = normalizeStr(document.getElementById('singlesCondition').value);
        if (wantCondition) filtered = filtered.filter(p => normalizeStr(p?.condition).includes(wantCondition));
      } else {
        filtered = filtered.filter(p => {
          const gc = firstNonEmpty(p, ['gradedCompany','gradedcompany','graded_company']);
          const g  = firstNonEmpty(p, ['graded','grade']);
          return isNonEmpty(gc) || isNonEmpty(g);
        });

        const wantCompany = normalizeStr(document.getElementById('gradedCompany').value);
        const wantGrade = normalizeStr(document.getElementById('gradedValue').value);

        if (wantCompany) {
          filtered = filtered.filter(p => {
            const gc = firstNonEmpty(p, ['gradedCompany','gradedcompany','graded_company']);
            return normalizeStr(gc).includes(wantCompany);
          });
        }
        if (wantGrade) {
          filtered = filtered.filter(p => {
            const g = firstNonEmpty(p, ['graded','grade']);
            return normalizeStr(g).includes(wantGrade);
          });
        }
      }
    }

    count.textContent = `${filtered.length} result${filtered.length === 1 ? '' : 's'}`;
    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty">No results found.</div>`;
      return;
    }

    filtered.forEach(p => container.appendChild(buildCard(p, type)));
  }

  function getCsrfToken(){
    const cookie = document.cookie
            .split('; ')
            .find(row => row.startsWith('XSRF-TOKEN='));

    return cookie ? decodeURIComponent(cookie.split('=')[1]) : '';
  }


  function buildSearchParams(){
    const params = new URLSearchParams();
    params.set('type', currentCategory);

    if (currentCategory === 'singles') {
      const id = document.getElementById('singlesId').value.trim();
      const name = document.getElementById('singlesName').value.trim();
      const collector = document.getElementById('singlesCollectorNumber').value.trim();
      const setVal = document.getElementById('singlesSet').value.trim();
      const yearVal = document.getElementById('singlesYear').value.trim();

      if (id) params.set('idQuery', id);
      if (name) params.set('nameQuery', name);
      if (collector) params.set('collectorNumberQuery', collector);
      if (setVal) params.set('set', setVal);
      if (yearVal) params.set('year', yearVal);

      if (singlesMode === 'raw') {
        const condition = document.getElementById('singlesCondition').value.trim();
        if (condition) params.set('conditionQuery', condition);
        params.delete('gradedCompanyQuery');
        params.delete('gradedValueQuery');
      } else {
        const company = document.getElementById('gradedCompany').value.trim();
        const grade = document.getElementById('gradedValue').value.trim();

        if (company) params.set('gradedCompanyQuery', company);
        if (grade) params.set('gradedValueQuery', grade);

        params.delete('conditionQuery');
      }
    } else {
      const id = document.getElementById('sealedId').value.trim();
      const name = document.getElementById('sealedName').value.trim();
      const productType = document.getElementById('sealedProductType').value.trim();
      const setVal = document.getElementById('sealedSet').value.trim();
      const yearVal = document.getElementById('sealedYear').value.trim();

      if (id) params.set('idQuery', id);
      if (name) params.set('nameQuery', name);
      if (productType) params.set('productTypeQuery', productType);
      if (setVal) params.set('set', setVal);
      if (yearVal) params.set('year', yearVal);
    }

    return params;
  }

  function loadProducts(){
    const params = buildSearchParams();
    const url = `/inventory/pokemon/search?${params.toString()}`;

    fetch(url)
            .then(res => res.json())
            .then(data => displayProducts(currentCategory, data))
            .catch(err => console.error(err));
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadProducts();
  });

  document.addEventListener('DOMContentLoaded', () => {
    setCategory('singles');
    setSinglesMode('raw', false);
    loadProducts();
  });
</script>
